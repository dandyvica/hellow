name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        toolchain:
          - stable

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        targets: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl
    - name: Building on ${{ runner.os }}-${{ runner.arch }}
      run: |
        ls -al
        pwd
        cargo build --release
        cargo build --release --target x86_64-unknown-linux-musl
        export TRIPLE=$(rustc -vV | sed -n 's|host: ||p')
        echo "TRIPLE=$(rustc -vV | sed -n 's|host: ||p')" >> $GITHUB_ENV
        echo $TRIPLE
    - name: Archive compilation target for ${{ matrix.os }}-${{ matrix.version }}
      uses: actions/upload-artifact@v4
      with:
        name: hellow-${{ TRIPLE }}
        path: target/release/hellow



